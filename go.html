</head>

        var wuhanBounds = new AMap.Bounds(

            [114.8, 31.0]  // 东北角坐标

            viewMode: '3D',
            zoom: 12,
            center: [114.305392, 30.593098],

            features: ['bg', 'road', 'building'],
            bounds: wuhanBounds,
            restrictBounds: true,
            zoomEnable: true,
            dragEnable: true,
            doubleClickZoom: false,
            keyboardEnable: false,
            touchZoom: false, // 禁用触摸缩放
            rotateEnable: false // 禁用旋转
        });

        // 监听地图移动和缩放事件，强制限制在武汉范围内
        map.on('movestart', function () {
            checkBounds();
        });

        map.on('moveend', function () {
            checkBounds();
        });

        map.on('zoomchange', function () {
            checkBounds();
        });

            // 获取当前地图中心点和缩放级别
            var center = map.getCenter();
            var zoom = map.getZoom();

            // 如果中心点超出武汉范围，则重置到武汉中心
            if (!wuhanBounds.contains(center)) {
                map.setCenter([114.305392, 30.593098]);
            }

            // 限制缩放级别
            if (zoom < 13) {
                map.setZoom(13);
            } else if (zoom > 16) {
                map.setZoom(16);
            }
        }

                // case '其他级':
                //     currentIcon = otherIcon;
                //     break;
                default:
                    // 级别不匹配时，默认用一般级图标
                    currentIcon = normalIcon;
            }

            var marker = new AMap.Marker({
                position: relic.position,
                icon: currentIcon,              // 使用对应等级的图标
                title: relic.name,
                offset: new AMap.Pixel(-12, -12), // 图标中心点对齐坐标点
                map: map
            });

            // 创建信息窗口内容
            var infoContent = document.createElement('div');
            infoContent.className = 'info-window';

            var title = document.createElement('div');
            title.className = 'info-title';
            title.innerHTML = relic.name;

            var english = document.createElement('div');
            english.className = 'info-english';
            english.innerHTML = relic.english;

            var content = document.createElement('div');
            content.className = 'info-content';
            content.innerHTML = relic.description;

            infoContent.appendChild(title);
            infoContent.appendChild(english);
            infoContent.appendChild(content);

            // 创建信息窗口
            var infoWindow = new AMap.InfoWindow({
                content: infoContent,
                offset: new AMap.Pixel(0, -30)
            });

            // 点击标记点显示信息窗口
            marker.on('click', function () {
                // 关闭所有其他信息窗口
                closeAllInfoWindows();
                infoWindow.open(map, marker.getPosition());
            });

            // 存储标记点和信息窗口
            markers.push({
                marker: marker,
                infoWindow: infoWindow,
                data: relic
            });
        });

        // 关闭所有信息窗口
        function closeAllInfoWindows() {
            markers.forEach(function (item) {
                item.infoWindow.close();
            });
        }

        // 搜索功能实现
        var searchInput = document.getElementById('search-input');
        var searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', function () {
            var keyword = this.value.trim();

            if (keyword === '') {
                searchResults.style.display = 'none';
                return;
            }

            // 过滤匹配的文物
            var results = markers.filter(function (item) {
                return item.data.name.includes(keyword) ||
                    item.data.english.toLowerCase().includes(keyword.toLowerCase());
            });

            // 显示搜索结果
            displaySearchResults(results);
        });

        // 显示搜索结果
        function displaySearchResults(results) {
            searchResults.innerHTML = '';

            if (results.length === 0) {
                searchResults.innerHTML = '<div class="no-results">未找到匹配的文物</div>';
                searchResults.style.display = 'block';
                return;
            }

            results.forEach(function (item) {
                var resultItem = document.createElement('div');
                resultItem.className = 'search-result-item';
                resultItem.textContent = item.data.name + ' (' + item.data.english + ')';

                resultItem.addEventListener('click', function () {
                    // 定位到该文物
                    map.setCenter(item.marker.getPosition());
                    map.setZoom(15);

                    // 关闭所有信息窗口，然后打开当前文物的信息窗口
                    closeAllInfoWindows();
                    item.infoWindow.open(map, item.marker.getPosition());

                    // 清空搜索结果
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });

                searchResults.appendChild(resultItem);
            });

            searchResults.style.display = 'block';
        }

        // 点击地图其他区域关闭搜索结果
        map.on('click', function () {
            searchResults.style.display = 'none';
        });

        // 添加地图控件
        map.addControl(new AMap.ControlBar({
            showZoomBar: true,
            showControlButton: true,
            position: {
                right: '10px',
                top: '10px'
            }
        }));

        // 添加比例尺
        map.addControl(new AMap.Scale());

        // 初始检查边界
        checkBounds();
    </script>
</body>
